services:
  - type: web
    name: kuchyne-cihovsky
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install && (npm run init-db || true)
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: kuchyne2026
      - key: CONTACT_EMAIL
        value: cihovsky@c-box.cz
      - key: CONTACT_PHONE
        value: "+420 608 032 103"
      - key: CONTACT_ADDRESS
        value: "Olešník 6, 373 50 Olešník"
      - key: CONTACT_HOURS
        value: "Po–Pá 7:00–15:30"
      - key: CONTACT_OWNER
        value: "Vlastimil Čihovský"
      - key: INSTAGRAM_URL
        value: https://instagram.com/kuchyne_cihovsky
      - key: FACEBOOK_URL
        value: https://facebook.com/kuchyne.cihovsky
